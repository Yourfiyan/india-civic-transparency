version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: civic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: civic
      POSTGRES_PASSWORD: civic
      POSTGRES_DB: civic_transparency
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civic -d civic_transparency"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
